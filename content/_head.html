<style>/* widget: JPTV Puntero Circular Fluido */

/* --- DEFINICIÓN DE LA PELÍCULA (ANIMACIÓN) --- */
@keyframes pcfGrow {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

@keyframes pcfShrink {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
}

/* --- 1. RASTREADOR (Solo movimiento) --- */
.pcf-tracker {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 999999;
    pointer-events: none;
    width: 0 !important;
    height: 0 !important;
    will-change: transform;
}

/* --- 2. CAJA DE ANIMACIÓN (Donde ocurre la magia) --- */
.pcf-animation-box {
    position: absolute;
    /* Centrado Matemático */
    top: -30px;
    left: -30px;
    width: 60px !important;
    height: 60px !important;
    
    /* ESTADO INICIAL: Invisible */
    transform: scale(0);
    opacity: 0;
    
    /* Limpieza */
    margin: 0 !important;
    padding: 0 !important;
    border: none !important;
}

/* --- REGLAS DE EJECUCIÓN --- */

/* CASO A: Cuando entramos (Clase .is-active) -> REPRODUCIR CRECIMIENTO */
.pcf-tracker.is-active .pcf-animation-box {
    /* Nombre | Duración | Curva | Mantener estado final */
    animation: pcfGrow 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
}

/* CASO B: Cuando salimos (Clase .is-exiting) -> REPRODUCIR ENCOGIMIENTO */
.pcf-tracker.is-exiting .pcf-animation-box {
